<div class="container mt-5" style="max-width: 420px;">
  <h2 class="text-center mb-4">🔐 Iniciar Sesión</h2>

  <!-- 🚨 Mensajes de éxito o error (Actividad 3) -->
  <div 
    *ngIf="mensaje" 
    class="alert" 
    [class.alert-success]="esExitoso" 
    [class.alert-danger]="!esExitoso"
  >
    {{ mensaje }}
  </div>

  <!-- Formulario -->
  <div class="card shadow">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Usuario:</label>
        <input 
          type="text" 
          class="form-control" 
          [(ngModel)]="usuario" 
          placeholder="Ingresa tu usuario"
          required
        >
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña:</label>
        <input 
          type="password" 
          class="form-control" 
          [(ngModel)]="clave" 
          placeholder="Ingresa tu contraseña"
          required
        >
      </div>

      <button 
        class="btn btn-primary w-100" 
        (click)="iniciarSesion()"
      >
        Entrar
      </button>
    </div>
  </div>
</div>
